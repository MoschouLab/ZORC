project_dir: ~/Documents/ZORC
data:
  raw_dir: data/raw
  processed_dir: data/processed
  results_dir: results
  logs_dir: logs
input_files:
  apeal_excel: data/raw/EMBOJ-2022-111885_SourceFile1_.xlsx
  apeal_sheet: in
  trip_excel: data/raw/tpc_23_01160Supplemental_Data_Sets_1XXX10.xlsx
  trip_sheet: Suppl. Data set 2
  trip_header_rows: 4
reference:
  gtf: ~/Documents/TRIP-isoform-lncoding-pipeline/05_reference/Arabidopsis_thaliana.TAIR10.59.gtf
  genome_fasta: ~/Documents/TRIP-isoform-lncoding-pipeline/05_reference/Arabidopsis_thaliana.TAIR10.dna.toplevel.fa
  rmats_ns_dir: ~/Documents/TRIP-isoform-lncoding-pipeline/04_results/05c_rmats/NS
  rmats_hs_dir: ~/Documents/TRIP-isoform-lncoding-pipeline/04_results/05c_rmats/HS
coregulon:
  protein_enrichment_threshold: 0.0
  conflict_resolution: strongest
  rna_min_abs_log2fc: 0.0
classes:
  positive_label: 1
  negative_label: 0
bioemu_tiers:
  tier1_max_idr: 10.0
  tier2_max_idr: 30.0
  tier2_n_conformations: 50
  tier3_n_conformations: 100
  tier1_n_conformations: 100
ml:
  cdhit_identity_threshold: 0.4
  train_fraction: 0.7
  val_fraction: 0.15
  test_fraction: 0.15
  random_seed: 42
  rf_n_estimators: 500
  rf_class_weight: balanced
xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  min_child_weight: 5
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 30
  shap_background_n: 500
  random_state: 42
outputs:
  coregulon_list: data/processed/01_zorc_coregulon_list.csv
  coregulon_report: logs/01_coregulon_build_report.txt
  positives_fasta_mrna: data/processed/02_positives_mrna.fa
  positives_fasta_protein: data/processed/02_positives_protein.fa
  negatives_fasta_mrna: data/processed/02_negatives_mrna.fa
  negatives_fasta_protein: data/processed/02_negatives_protein.fa
  aiupred_results: data/processed/05_aiupred_idr_summary.csv
  feature_matrix: data/processed/08_zorc_feature_matrix.csv
  rf_model: results/09_zorc_rf_model.pkl
  shap_values: results/09_zorc_shap_values.csv
  isoform_map: data/processed/02_zorc_isoform_map.csv
  isoform_map_report: logs/02_isoform_map_report.txt
  sequences_dir: data/processed/sequences
  all_mrna_fa: data/processed/sequences/all_mrna.fa
  all_protein_fa: data/processed/sequences/all_protein.fa
  positives_mrna_fa: data/processed/sequences/positives_mrna.fa
  positives_protein_fa: data/processed/sequences/positives_protein.fa
  negatives_mrna_fa: data/processed/sequences/negatives_mrna.fa
  negatives_protein_fa: data/processed/sequences/negatives_protein.fa
  sequence_qc_report: logs/03_sequence_qc_report.txt
  sequence_manifest: data/processed/03_sequence_manifest.csv
  aiupred_report: logs/05_aiupred_report.txt
  bioemu_tier_list: data/processed/05_bioemu_tier_assignments.csv
  bioemu_dir: data/processed/bioemu
  bioemu_checkpoint: data/processed/bioemu/checkpoint.json
  bioemu_report: logs/06_bioemu_report.txt
  rna_features: data/processed/04_rna_features.csv
  rna_features_report: logs/04_rna_features_report.txt
  protein_features: data/processed/07_protein_features.csv
  protein_features_report: logs/07_protein_features_report.txt
  split_assignments: data/processed/08_zorc_split_assignments.csv
  feature_matrix_report: logs/08_feature_matrix_report.txt
  rf_report: logs/09_rf_report.txt
  rf_predictions: results/09_zorc_predictions.csv
  xgb_model: results/09b_zorc_xgb_model.json
  xgb_shap_values: results/09b_zorc_xgb_shap_values.csv
  xgb_shap_importance: results/09b_zorc_xgb_shap_importance.csv
  xgb_predictions: results/09b_zorc_xgb_predictions.csv
  xgb_report: logs/09b_xgb_report.txt
  hc_set: data/processed/colleague_high_confidence_set.csv
  bioemu_checkpoint_tier1: data/processed/bioemu/checkpoint_tier1.json
  bioemu_report_tier1: logs/06b_bioemu_tier1_report.txt
xgboost_model_file: results/09b_zorc_xgb_model.json
xgboost_shap_importance_file: results/09b_zorc_xgb_shap_importance.csv
