name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Run ruff on api/ and tests/
        run: ruff check api/ tests/ --select=E,F --ignore=E501

  # ── Job 2: Tests ────────────────────────────────────────────────────────────
  test:
    name: Test (pytest --cov ≥60%)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

  # ── Job 3: Docker build smoke test ─────────────────────────────────────────
  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: zorc-predictor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build only; runtime smoke test would require GPU/model artefacts
          # not available in GitHub-hosted runners.
